# Nixpacks build for the single App service (backend + built SPA).
# Railway runs the start command from the Procfile.

[phases.setup]
nixPkgs = ["nodejs_20", "python312", "gcc"]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip && pip install -r backend/requirements.txt",
  "cd frontend && npm ci",
]

[phases.build]
cmds = ["cd frontend && npm run build"]

[start]
cmd = ". /opt/venv/bin/activate && uvicorn app.main:app --app-dir backend --host 0.0.0.0 --port $PORT"

[variables]
PYTHONUNBUFFERED = "1"
